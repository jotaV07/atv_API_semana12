<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Filmes</title>
 <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1 class="logo">🎬 CineDB</h1>
      <p class="tagline">Os melhores filmes em um só lugar</p>
    </div>
  </header>

  <section class="search-bar">
    <div class="search-inner">
      <input id="search" type="text" placeholder="Buscar filme..." autocomplete="off" />
      <button id="btnSearch">Buscar</button>
    </div>
  </section>

  <main>
    <p id="message"></p>
    <div id="movie-list"></div>
  </main>

  <footer>
    <p>Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank">The Movie Database (TMDB)</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
